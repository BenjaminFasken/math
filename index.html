<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Editor</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://unpkg.com/mathlive"></script>
    <script defer src="js/app.js"></script>
</head>
<body>
    <div class="top-hit-area">
        <div id="toolbar" class="toolbar">
            <button id="toggle-theme">Toggle Dark Mode</button>
            <button id="add-text">Add Text Block</button>
            <button id="add-math">Add Math Block</button>
        </div>
    </div>
    <div id="editor-container" class="document">
        <math-field class="math-line block"></math-field>
    </div>
</body>
</html>
