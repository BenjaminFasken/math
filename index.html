<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapleCAS – Computer Algebra System</title>

  <!-- ── Google Fonts ──────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <!-- ── Compute Engine (needed by MathLive for MathJSON export) ── -->
  <script src="https://unpkg.com/@cortex-js/compute-engine"></script>

  <!-- ── MathLive  (registers <math-field> web component) ── -->
  <script defer src="https://unpkg.com/mathlive"></script>

  <!-- ── Custom Styles ─────────────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
<!-- ============================================================
     APP SHELL
     ============================================================ -->
<div id="app">

  <!-- ─────────────── TOP RIBBON ──────────────────────────── -->
  <header id="ribbon">
    <!-- Brand -->
    <div class="brand">MapleCAS <span>v0.1</span></div>
    <div class="ribbon-sep"></div>

    <!-- Cell actions -->
    <div class="ribbon-group">
      <button class="ribbon-btn" id="btn-new-cell" title="New math cell">
        ＋ Cell
      </button>
      <button class="ribbon-btn" id="btn-new-text" title="New text cell">
        ¶ Text
      </button>
      <button class="ribbon-btn primary" id="btn-evaluate" title="Evaluate active cell (Enter)">
        ▶ Evaluate
      </button>
      <button class="ribbon-btn" id="btn-evaluate-all" title="Evaluate every cell">
        ▶▶ Run All
      </button>
    </div>

    <div class="ribbon-sep"></div>

    <!-- Quick operations -->
    <div class="ribbon-group">
      <button class="ribbon-btn" id="btn-expand">Expand</button>
      <button class="ribbon-btn" id="btn-factor">Factor</button>
      <button class="ribbon-btn" id="btn-simplify">Simplify</button>
    </div>

    <div class="ribbon-sep"></div>

    <div class="ribbon-group">
      <button class="ribbon-btn" id="btn-clear" title="Clear worksheet">
        ✕ Clear
      </button>
    </div>

    <div class="ribbon-sep"></div>

    <!-- Save / Load -->
    <div class="ribbon-group">
      <button class="ribbon-btn" id="btn-save-ws" title="Save worksheet to file">
        💾 Save
      </button>
      <button class="ribbon-btn" id="btn-load-ws" title="Load worksheet from file">
        📂 Open
      </button>
    </div>

    <!-- Spacer pushes status to the right -->
    <div class="spacer"></div>

    <!-- CAS engine status indicator -->
    <div id="pyodide-status">
      <span class="dot"></span> Initialising…
    </div>
  </header>

  <!-- ─────────────── 3-COLUMN BODY ──────────────────────── -->
  <div id="main-layout">

    <!-- ============ LEFT SIDEBAR – Palettes ================ -->
    <aside id="left-sidebar">
      <div class="sidebar-header">Palettes</div>

      <div class="palette-scroll">

        <!-- ── Basic Operations ──────────────────────────── -->
        <div class="accordion-item open">
          <button class="accordion-btn">
            Basic Operations <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="+" title="Addition">+</button>
              <button class="palette-btn" data-insert="-" title="Subtraction">−</button>
              <button class="palette-btn" data-insert="\times " title="Multiplication">×</button>
              <button class="palette-btn" data-insert="\div " title="Division">÷</button>
              <button class="palette-btn" data-insert="=" title="Equals">=</button>
              <button class="palette-btn" data-insert="\neq " title="Not equal">≠</button>
              <button class="palette-btn" data-insert="\leq " title="Less or equal">≤</button>
              <button class="palette-btn" data-insert="\geq " title="Greater or equal">≥</button>
              <button class="palette-btn" data-insert="\pm " title="Plus-minus">±</button>
              <button class="palette-btn" data-insert="\cdot " title="Dot multiply">·</button>
            </div>
          </div>
        </div>

        <!-- ── Powers & Roots ────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Powers &amp; Roots <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="#0^{2}" title="Square">x²</button>
              <button class="palette-btn" data-insert="#0^{3}" title="Cube">x³</button>
              <button class="palette-btn" data-insert="#0^{#1}" title="Power">xⁿ</button>
              <button class="palette-btn" data-insert="\sqrt{#0}" title="Square root">√</button>
              <button class="palette-btn" data-insert="\sqrt[3]{#0}" title="Cube root">∛</button>
              <button class="palette-btn" data-insert="\sqrt[#0]{#1}" title="nth root">ⁿ√</button>
              <button class="palette-btn" data-insert="#0^{-1}" title="Inverse">x⁻¹</button>
              <button class="palette-btn" data-insert="e^{#0}" title="Exponential">eˣ</button>
            </div>
          </div>
        </div>

        <!-- ── Fractions & Subscripts ────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Fractions <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="\frac{#0}{#1}" title="Fraction" style="font-size:13px">a/b</button>
              <button class="palette-btn" data-insert="#0_{#1}" title="Subscript" style="font-size:13px">x₁</button>
              <button class="palette-btn" data-insert="\binom{#0}{#1}" title="Binomial" style="font-size:12px">C(n,k)</button>
              <button class="palette-btn" data-insert="|#0|" title="Absolute value" style="font-size:14px">|x|</button>
              <button class="palette-btn" data-insert="#0!" title="Factorial">n!</button>
            </div>
          </div>
        </div>

        <!-- ── Calculus ──────────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Calculus <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="\int #0 \, d#1" title="Integral" style="font-size:20px">∫</button>
              <button class="palette-btn" data-insert="\int_{#0}^{#1} #2 \, d#3" title="Definite integral" style="font-size:15px">∫ᵃᵇ</button>
              <button class="palette-btn" data-insert="\frac{d}{d#0}#1" title="Derivative" style="font-size:12px">d/dx</button>
              <button class="palette-btn" data-insert="\frac{\partial}{\partial #0}#1" title="Partial derivative" style="font-size:12px">∂/∂x</button>
              <button class="palette-btn" data-insert="\sum_{#0}^{#1} #2" title="Summation" style="font-size:20px">Σ</button>
              <button class="palette-btn" data-insert="\prod_{#0}^{#1} #2" title="Product" style="font-size:20px">∏</button>
              <button class="palette-btn" data-insert="\lim_{#0 \to #1} #2" title="Limit" style="font-size:12px">lim</button>
              <button class="palette-btn" data-insert="\infty" title="Infinity">∞</button>
            </div>
          </div>
        </div>

        <!-- ── Trigonometry ──────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Trigonometry <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="\sin(#0)" title="Sine" style="font-size:12px">sin</button>
              <button class="palette-btn" data-insert="\cos(#0)" title="Cosine" style="font-size:12px">cos</button>
              <button class="palette-btn" data-insert="\tan(#0)" title="Tangent" style="font-size:12px">tan</button>
              <button class="palette-btn" data-insert="\arcsin(#0)" title="Arcsine" style="font-size:11px">asin</button>
              <button class="palette-btn" data-insert="\arccos(#0)" title="Arccosine" style="font-size:11px">acos</button>
              <button class="palette-btn" data-insert="\arctan(#0)" title="Arctangent" style="font-size:11px">atan</button>
            </div>
          </div>
        </div>

        <!-- ── Logarithms ────────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Logarithms <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="\ln(#0)" title="Natural log" style="font-size:13px">ln</button>
              <button class="palette-btn" data-insert="\log(#0)" title="Log base 10" style="font-size:12px">log</button>
              <button class="palette-btn" data-insert="\log_{#0}(#1)" title="Log base n" style="font-size:11px">logₙ</button>
              <button class="palette-btn" data-insert="e" title="Euler's number" style="font-size:14px">𝑒</button>
            </div>
          </div>
        </div>

        <!-- ── Greek Letters ─────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Greek Letters <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="palette-grid">
              <button class="palette-btn" data-insert="\alpha" title="alpha">α</button>
              <button class="palette-btn" data-insert="\beta" title="beta">β</button>
              <button class="palette-btn" data-insert="\gamma" title="gamma">γ</button>
              <button class="palette-btn" data-insert="\delta" title="delta">δ</button>
              <button class="palette-btn" data-insert="\epsilon" title="epsilon">ε</button>
              <button class="palette-btn" data-insert="\theta" title="theta">θ</button>
              <button class="palette-btn" data-insert="\lambda" title="lambda">λ</button>
              <button class="palette-btn" data-insert="\mu" title="mu">μ</button>
              <button class="palette-btn" data-insert="\pi" title="pi">π</button>
              <button class="palette-btn" data-insert="\sigma" title="sigma">σ</button>
              <button class="palette-btn" data-insert="\phi" title="phi">φ</button>
              <button class="palette-btn" data-insert="\omega" title="omega">ω</button>
            </div>
          </div>
        </div>

        <!-- ── Matrices ──────────────────────────────────── -->
        <div class="accordion-item">
          <button class="accordion-btn">
            Matrices <span class="arrow">▸</span>
          </button>
          <div class="accordion-body">
            <div class="matrix-picker-wrapper">
              <button class="palette-btn" id="matrix-picker-trigger" style="width:100%;font-size:13px;margin-bottom:6px;">
                Insert Matrix…
              </button>
              <div id="matrix-picker" class="matrix-picker">
                <div class="matrix-grid"></div>
                <div class="matrix-label">Hover to select size</div>
              </div>
            </div>
            <div class="palette-grid" style="margin-top:6px;">
              <button class="palette-btn" data-insert="\begin{pmatrix} #0 \\ #1 \end{pmatrix}" title="2-vector" style="font-size:11px">v₂</button>
              <button class="palette-btn" data-insert="\begin{pmatrix} #0 \\ #1 \\ #2 \end{pmatrix}" title="3-vector" style="font-size:11px">v₃</button>
            </div>
          </div>
        </div>

      </div><!-- /palette-scroll -->
    </aside>

    <!-- ============ MAIN WORKSPACE ========================= -->
    <main id="workspace">
      <!-- Document title -->
      <div
        id="doc-title"
        contenteditable="true"
        spellcheck="false"
      >Untitled Worksheet</div>
      <div id="doc-subtitle">Press <kbd>Enter</kbd> to evaluate · Click result to toggle numeric/symbolic</div>

      <!-- Math cells are created here dynamically by CellManager -->
      <div id="document"></div>
    </main>

    <!-- ============ RIGHT SIDEBAR – Context Panel ========== -->
    <aside id="right-sidebar">
      <div class="sidebar-header">Actions</div>

      <div class="context-scroll">

        <!-- Transformations -->
        <div class="ctx-section">
          <div class="ctx-section-title">Transform</div>
          <button class="ctx-btn" data-action="simplify">
            <span class="icon">≡</span> Simplify
          </button>
          <button class="ctx-btn" data-action="expand">
            <span class="icon">⇔</span> Expand
          </button>
          <button class="ctx-btn" data-action="factor">
            <span class="icon">⊟</span> Factor
          </button>
        </div>

        <!-- Calculus -->
        <div class="ctx-section">
          <div class="ctx-section-title">Calculus</div>
          <button class="ctx-btn" data-action="diff">
            <span class="icon">∂</span> Differentiate
          </button>
          <button class="ctx-btn" data-action="integrate">
            <span class="icon">∫</span> Integrate
          </button>
        </div>

        <!-- Algebra -->
        <div class="ctx-section">
          <div class="ctx-section-title">Algebra</div>
          <button class="ctx-btn" data-action="solve">
            <span class="icon">⊜</span> Solve for variable
          </button>
        </div>

        <!-- Detected variables -->
        <div class="ctx-section">
          <div class="ctx-section-title">Detected Variables</div>
          <div class="var-pills" id="var-pills">
            <span style="color:#94a3b8;font-size:13px;">Type an expression…</span>
          </div>
        </div>

      </div><!-- /context-scroll -->
    </aside>

  </div><!-- /main-layout -->

</div><!-- /app -->

<!-- ── Loading Overlay ────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="loader-ring"></div>
  <div class="loader-text">Initialising CAS Engine</div>
  <div class="loader-sub">Loading Pyodide &amp; SymEngine…</div>
</div>

<!-- ── Pyodide  (WASM Python runtime) ─────────────────────── -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>

<!-- ── Application Logic ──────────────────────────────────── -->
<script src="js/app.js"></script>

</body>
</html>
