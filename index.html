<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Editor</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://unpkg.com/mathlive"></script>
    <script defer src="node_modules/@cortex-js/compute-engine/dist/compute-engine.min.umd.cjs"></script>
    <script defer src="node_modules/pyodide/pyodide.js"></script>
    <script defer src="js/evaluator-core.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body>
    <div class="top-hit-area">
        <div id="toolbar" class="toolbar">
            <button id="toggle-theme">Toggle Dark Mode</button>
            <button id="add-text">Add Text</button>
            <button id="add-math">Add Math</button>
            <button id="btn-save">Save Doc</button>
            <button id="btn-load">Load Doc</button>
            <input type="file" id="file-input" accept=".txt" style="display: none;">
        </div>
    </div>
    <div id="editor-container" class="document">
    </div>
</body>
</html>
